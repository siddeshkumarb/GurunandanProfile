<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gurunandan Math Quiz — 2nd &amp; 3rd Grade</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f2; color: #1a1a18; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
    .app { width: 100%; max-width: 540px; }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; }

    .topic-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
    .topic-btn { padding: 12px 8px; border-radius: 12px; border: 2px solid transparent; background: #ebebeb; cursor: pointer; text-align: center; font-size: 14px; font-weight: 500; color: #5f5e5a; transition: all 0.15s; }
    .topic-btn:hover { border-color: #b4b2a9; color: #1a1a18; }
    .topic-btn.active { color: #1a1a18; }
    .topic-btn .icon { font-size: 24px; display: block; margin-bottom: 4px; }

    .section-label { font-size: 13px; color: #888780; margin: 0 0 8px; }
    .grade-row { display: flex; gap: 10px; margin-bottom: 1.25rem; }

    .q-card { background: #fff; border: 0.5px solid #d3d1c7; border-radius: 12px; padding: 2rem 1.5rem; text-align: center; margin-bottom: 1rem; }
    .q-label { font-size: 13px; color: #888780; margin-bottom: 0.5rem; }
    .q-text { font-size: 36px; font-weight: 500; color: #1a1a18; margin: 0.5rem 0 1.5rem; }
    .ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
    .ans-btn { padding: 14px; border-radius: 8px; border: 0.5px solid #b4b2a9; background: #fff; font-size: 20px; font-weight: 500; cursor: pointer; color: #1a1a18; transition: all 0.15s; }
    .ans-btn:hover:not(:disabled) { background: #f1efe8; }
    .ans-btn.correct { background: #eaf3de; border-color: #639922; color: #27500a; }
    .ans-btn.wrong { background: #fcebeb; border-color: #a32d2d; color: #501313; }
    .ans-btn:disabled { cursor: default; }

    .feedback { font-size: 18px; font-weight: 500; min-height: 28px; margin-bottom: 0.75rem; }
    .feedback.good { color: #3b6d11; }
    .feedback.bad { color: #a32d2d; }

    .stats-row { display: flex; gap: 10px; margin-bottom: 1.25rem; }
    .stat { flex: 1; background: #ebebeb; border-radius: 8px; padding: 10px; text-align: center; }
    .stat-val { font-size: 22px; font-weight: 500; color: #1a1a18; }
    .stat-lbl { font-size: 12px; color: #888780; }

    .prog-bar-wrap { background: #ebebeb; border-radius: 8px; height: 8px; margin-bottom: 1.25rem; overflow: hidden; }
    .prog-bar { height: 100%; border-radius: 8px; background: #639922; transition: width 0.3s; }

    .next-btn { width: 100%; padding: 12px; border-radius: 8px; border: 0.5px solid #b4b2a9; background: #ebebeb; font-size: 15px; font-weight: 500; cursor: pointer; color: #1a1a18; }
    .next-btn:hover { background: #fff; }

    .results-card { background: #fff; border: 0.5px solid #d3d1c7; border-radius: 12px; padding: 2rem; text-align: center; }
    .trophy { font-size: 48px; margin-bottom: 0.5rem; }
    .grade-txt { font-size: 22px; font-weight: 500; color: #1a1a18; margin-bottom: 0.25rem; }
    .score-txt { font-size: 15px; color: #888780; margin-bottom: 1.5rem; }
    .restart-btn { padding: 12px 28px; border-radius: 8px; border: 0.5px solid #b4b2a9; background: #ebebeb; font-size: 15px; font-weight: 500; cursor: pointer; color: #1a1a18; }

    .history-list { text-align: left; margin-top: 1.25rem; border-top: 0.5px solid #d3d1c7; padding-top: 1rem; }
    .history-item { display: flex; justify-content: space-between; font-size: 14px; padding: 5px 0; border-bottom: 0.5px solid #d3d1c7; color: #888780; }
    .history-item .mark { font-weight: 500; }
    .history-item .mark.c { color: #3b6d11; }
    .history-item .mark.w { color: #a32d2d; }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; color: #f1efe8; }
      .topic-btn { background: #2c2c2a; color: #888780; }
      .topic-btn:hover { border-color: #5f5e5a; color: #f1efe8; }
      .q-card, .results-card { background: #2c2c2a; border-color: #444441; }
      .q-text, .stat-val, .grade-txt { color: #f1efe8; }
      .ans-btn { background: #2c2c2a; border-color: #5f5e5a; color: #f1efe8; }
      .ans-btn:hover:not(:disabled) { background: #444441; }
      .ans-btn.correct { background: #173404; border-color: #3b6d11; color: #c0dd97; }
      .ans-btn.wrong { background: #501313; border-color: #a32d2d; color: #f7c1c1; }
      .stat, .prog-bar-wrap, .next-btn, .restart-btn { background: #2c2c2a; }
      .next-btn, .restart-btn { border-color: #5f5e5a; color: #f1efe8; }
      .next-btn:hover, .restart-btn:hover { background: #444441; }
      .history-item { border-color: #444441; }
      .history-list { border-color: #444441; }
    }
  </style>
</head>
<body>
<div class="app">
  <h1>Math Quiz</h1>

  <div id="setup-screen">
    <p class="section-label">Choose a topic</p>
    <div class="topic-grid" id="topic-grid"></div>


    <button class="next-btn" onclick="startQuiz()" style="background:#E6F1FB;border-color:#185FA5;color:#0C447C;font-size:16px;">
      <i class="ti ti-player-play" aria-hidden="true"></i> Start quiz
    </button>
  </div>

  <div id="quiz-screen" style="display:none;">
    <div class="stats-row">
      <div class="stat"><div class="stat-val" id="stat-q">0</div><div class="stat-lbl">question</div></div>
      <div class="stat"><div class="stat-val" id="stat-score">0</div><div class="stat-lbl">correct</div></div>
      <div class="stat"><div class="stat-val" id="stat-streak">0</div><div class="stat-lbl">streak</div></div>
    </div>
    <div class="prog-bar-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
    <div class="q-card">
      <div class="q-label" id="q-topic-label"></div>
      <div class="q-text" id="q-text"></div>
      <div class="feedback" id="feedback"></div>
      <div class="ans-grid" id="ans-grid"></div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()" style="display:none;">
      Next question <i class="ti ti-arrow-right" aria-hidden="true"></i>
    </button>
  </div>

  <div id="results-screen" style="display:none;">
    <div class="results-card">
      <div class="trophy" id="trophy-icon"></div>
      <div class="grade-txt" id="grade-txt"></div>
      <div class="score-txt" id="score-txt"></div>
      <button class="restart-btn" onclick="showSetup()">Try again <i class="ti ti-refresh" aria-hidden="true"></i></button>
      <div class="history-list" id="history-list"></div>
    </div>
  </div>
</div>

<script>
const TOPICS = [
  { id:'add', label:'Addition',       icon:'ti-plus',    color:'#185FA5', bg:'#E6F1FB', tc:'#0C447C' },
  { id:'sub', label:'Subtraction',    icon:'ti-minus',   color:'#854F0B', bg:'#FAEEDA', tc:'#633806' },
  { id:'mul', label:'Multiplication', icon:'ti-x',       color:'#3B6D11', bg:'#EAF3DE', tc:'#27500A' },
  { id:'div', label:'Division',       icon:'ti-divide',  color:'#533AB7', bg:'#EEEDFE', tc:'#3C3489' },
  { id:'mix', label:'Mixed',          icon:'ti-infinity',color:'#5F5E5A', bg:'#F1EFE8', tc:'#444441' },
];

let selectedTopic = 'add';
let selectedQCount = 100;
let questions = [];
let current = 0;
let score = 0;
let streak = 0;
let answered = false;
let history = [];

function rnd(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function genQuestion(topic) {
  let t = topic === 'mix' ? ['add','sub','mul','div'][rnd(0,3)] : topic;
  let a, b, ans, question, label;
  if (t === 'add') {
    a = rnd(10, 200); b = rnd(10, 200);
    ans = a + b; question = `${a} + ${b} = ?`; label = 'Addition';
  } else if (t === 'sub') {
    a = rnd(20, 300); b = rnd(1, a);
    ans = a - b; question = `${a} − ${b} = ?`; label = 'Subtraction';
  } else if (t === 'mul') {
    a = rnd(2, 9); b = rnd(2, 12);
    ans = a * b; question = `${a} × ${b} = ?`; label = 'Multiplication';
  } else {
    b = rnd(2, 9); ans = rnd(1, 10); a = b * ans;
    question = `${a} ÷ ${b} = ?`; label = 'Division';
  }
  const wrongs = new Set();
  while (wrongs.size < 3) {
    const d = rnd(1, Math.max(5, Math.floor(ans * 0.3)));
    const w = rnd(0,1) ? ans + d : Math.max(0, ans - d);
    if (w !== ans) wrongs.add(w);
  }
  const opts = [ans, ...wrongs].sort(() => Math.random() - 0.5);
  return { question, ans, opts, label };
}

function buildTopicGrid() {
  const grid = document.getElementById('topic-grid');
  grid.innerHTML = '';
  TOPICS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'topic-btn' + (t.id === selectedTopic ? ' active' : '');
    if (t.id === selectedTopic) btn.style.cssText = `border-color:${t.color};background:${t.bg};color:${t.tc}`;
    btn.innerHTML = `<span class="icon"><i class="ti ${t.icon}" aria-hidden="true"></i></span>${t.label}`;
    btn.onclick = () => { selectedTopic = t.id; buildTopicGrid(); };
    grid.appendChild(btn);
  });
}

function startQuiz() {
  questions = Array.from({length: selectedQCount}, () => genQuestion(selectedTopic));
  current = 0; score = 0; streak = 0; history = [];
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  loadQuestion();
}

function loadQuestion() {
  answered = false;
  const q = questions[current];
  document.getElementById('stat-q').textContent = `${current + 1}/${selectedQCount}`;
  document.getElementById('stat-score').textContent = score;
  document.getElementById('stat-streak').textContent = streak;
  document.getElementById('prog-bar').style.width = `${(current / selectedQCount) * 100}%`;
  document.getElementById('q-topic-label').textContent = q.label;
  document.getElementById('q-text').textContent = q.question;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('next-btn').style.display = 'none';
  const grid = document.getElementById('ans-grid');
  grid.innerHTML = '';
  q.opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = opt;
    btn.onclick = () => checkAnswer(opt, q.ans);
    grid.appendChild(btn);
  });
}

function checkAnswer(chosen, correct) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.ans-btn').forEach(b => {
    b.disabled = true;
    if (parseInt(b.textContent) === correct) b.classList.add('correct');
    else if (parseInt(b.textContent) === chosen && chosen !== correct) b.classList.add('wrong');
  });
  const fb = document.getElementById('feedback');
  const q = questions[current];
  history.push({ question: q.question, ans: correct, chosen, ok: chosen === correct });
  if (chosen === correct) {
    score++; streak++;
    const msgs = ['Great job!', 'Correct!', 'Awesome!', 'You got it!', 'Brilliant!'];
    fb.textContent = streak >= 3 ? `${msgs[rnd(0,4)]} ${streak} in a row!` : msgs[rnd(0,4)];
    fb.className = 'feedback good';
  } else {
    streak = 0;
    fb.textContent = `Not quite — the answer is ${correct}`;
    fb.className = 'feedback bad';
  }
  document.getElementById('stat-score').textContent = score;
  document.getElementById('stat-streak').textContent = streak;
  if (current + 1 < selectedQCount) {
    document.getElementById('next-btn').style.display = 'block';
  } else {
    setTimeout(showResults, 900);
  }
}

function nextQuestion() { current++; loadQuestion(); }

function showResults() {
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('results-screen').style.display = 'block';
  const pct = Math.round((score / selectedQCount) * 100);
  let trophy, grade;
  if (pct === 100)      { trophy = '🏆'; grade = 'Perfect score!'; }
  else if (pct >= 80)   { trophy = '⭐'; grade = 'Great work!'; }
  else if (pct >= 60)   { trophy = '👍'; grade = 'Good effort!'; }
  else                  { trophy = '📚'; grade = 'Keep practicing!'; }
  document.getElementById('trophy-icon').textContent = trophy;
  document.getElementById('grade-txt').textContent = grade;
  document.getElementById('score-txt').textContent = `You got ${score} out of ${selectedQCount} correct (${pct}%)`;
  const list = document.getElementById('history-list');
  list.innerHTML = '<p style="font-size:13px;color:#888780;margin:0 0 8px;">Your answers</p>';
  history.forEach(h => {
    const row = document.createElement('div');
    row.className = 'history-item';
    row.innerHTML = `<span>${h.question.replace('?', '= ' + h.ans)}</span><span class="mark ${h.ok ? 'c' : 'w'}">${h.ok ? '✓' : `✗ (you said ${h.chosen})`}</span>`;
    list.appendChild(row);
  });
}

function showSetup() {
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'block';
}

buildTopicGrid();
</script>
</body>
</html>
